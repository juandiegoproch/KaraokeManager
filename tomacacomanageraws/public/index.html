<!DOCTYPE html>
<html>
<body>
<h1>Arc WebSocket Test</h1>
<pre id="log"></pre>
<script>
const log = document.getElementById("log");
const ws = new WebSocket("ws://localhost:3333");

ws.onopen = () => log.textContent += "Connected!\n";
ws.onmessage = (msg) => log.textContent += "Received: " + msg.data + "\n";
ws.onclose = () => log.textContent += "Disconnected!\n";

function sendTest() {
    ws.send(JSON.stringify({ type: "test", data: "hello" }));
}
</script>
<button onclick="sendTest()">Send Test Message</button>
</body>
</html>
