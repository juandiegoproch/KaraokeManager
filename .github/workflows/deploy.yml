name: Docker Compose CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-compose:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Build and start Docker Compose
        run: |
          docker compose down -v || true
          docker compose up --build -d
          sleep 10

      - name: Tear down Docker Compose
        if: always()
        run: docker compose down -v